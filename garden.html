<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>garden – bunny garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f1f6f8;
      --dark:     #21273d;
      --slate:    #6a759b;
      --blue:     #b9d4f1;
      --blue-dim: rgba(185,212,241,0.15);
      --purple:   #8c7dc0;
      --muted:    #7a87a8;
      --border:   #c4d6e8;
      --green:    #6a9a5b;
      --green-light: #8fbf7a;
      --pink:     #d4a0b9;
      --yellow:   #d4c77a;
      --brown:    #8b7355;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--dark); font-family: 'Courier Prime', 'Courier New', monospace; font-size: 17px; line-height: 1.8; }
    .page { max-width: 680px; margin: 0 auto; padding: 0 1.75rem; }
    a { color: var(--slate); text-underline-offset: 3px; }
    a:hover { color: var(--dark); }
    header { padding: 2.75rem 0 1.5rem; }
    .site-title { font-family: 'VT323', monospace; font-size: 3rem; color: var(--dark); letter-spacing: 0.04em; line-height: 1; }
    .site-title a { text-decoration: none; color: inherit; }
    .dot { color: var(--purple); }
    nav { margin-top: 0.75rem; display: flex; flex-wrap: wrap; column-gap: 1.375rem; }
    nav a { font-size: 0.9375rem; color: var(--muted); text-decoration: none; }
    nav a:hover { color: var(--dark); text-decoration: underline; }
    nav a.active { color: var(--slate); text-decoration: underline; }
    .rule { border: none; border-top: 1px dashed var(--border); margin: 0; }
    .section { padding: 1.875rem 0; }
    .section-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.125rem; }
    .section-label { font-family: 'VT323', monospace; font-size: 1.5rem; color: var(--slate); letter-spacing: 0.04em; }
    .section-label::before { content: '> '; color: var(--purple); }
    footer { padding: 1.875rem 0 3.5rem; font-size: 0.875rem; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .footer-links { display: flex; gap: 1rem; }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--dark); }

    /* garden canvas */
    .garden-wrap { position: relative; width: 100%; margin: 1rem 0 2rem; }
    .garden-canvas { width: 100%; display: block; image-rendering: pixelated; border-bottom: 3px solid var(--brown); }
    .garden-intro { font-size: 0.9375rem; color: var(--muted); font-style: italic; text-align: center; margin-bottom: 1.5rem; }
    .garden-stats { font-family: 'VT323', monospace; font-size: 1.1rem; color: var(--purple); text-align: center; margin: 1rem 0; letter-spacing: 0.04em; }

    /* entries */
    .entries { margin-top: 1.5rem; }
    .entry { padding: 0.75rem 0; border-bottom: 1px dotted var(--border); cursor: default; }
    .entry:last-child { border-bottom: none; }
    .entry-icon { display: inline-block; margin-right: 0.5rem; font-family: 'VT323', monospace; font-size: 1.1rem; }
    .entry-text { font-size: 0.9375rem; color: var(--dark); }
    .entry-date { font-size: 0.8125rem; color: var(--muted); margin-left: 0.25rem; }
    .entry-mood { display: inline-block; font-size: 0.75rem; color: var(--purple); font-style: italic; margin-left: 0.5rem; }

    .how-to { margin-top: 1.5rem; padding: 1rem 1.25rem; border-left: 2px solid var(--blue); background: var(--blue-dim); font-size: 0.875rem; color: var(--muted); }
    .how-to code { background: rgba(140,125,192,0.12); padding: 0.1rem 0.35rem; font-size: 0.8125rem; }

    @media (max-width: 500px) { .site-title { font-size: 2.25rem; } }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="site-title"><a href="index.html">bunny garden<span class="dot">.</span></a></div>
      <nav>
        <a href="about.html">about</a>
        <a href="now.html">now</a>
        <a href="films.html">films</a>
        <a href="garden.html" class="active">garden</a>
        <a href="guestbook.html">guestbook</a>
        <a href="archive.html">all posts</a>
        <a href="feed.xml">rss</a>
      </nav>
    </header>

    <hr class="rule">

    <div class="section">
      <div class="section-head">
        <span class="section-label">garden</span>
        <span style="font-size:0.875rem;color:var(--muted);" id="season-tag"></span>
      </div>

      <p class="garden-intro">every thought planted here helps the garden grow.</p>

      <div class="garden-wrap">
        <canvas id="garden-canvas" class="garden-canvas" width="680" height="260"></canvas>
      </div>

      <p class="garden-stats" id="garden-stats"></p>

      <div class="entries" id="entries-list"></div>

      <div class="how-to">
        <p>to plant something new, add an entry to the <code>entries</code> array in this file and push to github. each thought grows the garden a little more.</p>
      </div>
    </div>

    <hr class="rule">

    <footer>
      <div class="footer-links">
        <a href="mailto:you@email.com">contact</a>
        <a href="guestbook.html">guestbook</a>
        <a href="feed.xml">rss</a>
      </div>
      <span>made with &#9825;</span>
    </footer>
  </div>

  <script>
    // ═══════════════════════════════════════
    //  ENTRIES — add yours here!
    //  format: { text: "your thought", date: "apr 16, 2026", icon: "seed/sprout/flower/bush/tree" }
    //  icon is optional — the garden picks one automatically if you leave it out
    // ═══════════════════════════════════════
    var entries = [
      { text: "sometimes the best conversations happen with things that can't talk back", date: "apr 16, 2026" },
      { text: "started this site today. let's see where it goes", date: "apr 14, 2026" },
      { text: "the sky was really pretty this morning", date: "apr 13, 2026" }
    ];

    // ═══════════════════════════════════════
    //  PIXEL GARDEN RENDERER
    // ═══════════════════════════════════════
    var COLORS = {
      purple:     '#8c7dc0',
      purpleLight:'#b0a4d4',
      green:      '#6a9a5b',
      greenLight: '#8fbf7a',
      greenDark:  '#4a7a3b',
      pink:       '#d4a0b9',
      pinkLight:  '#e8c4d6',
      yellow:     '#d4c77a',
      brown:      '#8b7355',
      brownLight: '#a89070',
      soil:       '#9a8665',
      soilDark:   '#7a6a4f',
      sky:        '#f1f6f8',
      white:      '#ffffff'
    };

    var canvas = document.getElementById('garden-canvas');
    var ctx = canvas.getContext('2d');
    var PX = 4; // pixel size for the art

    function px(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * PX, y * PX, PX, PX);
    }

    function drawRect(x, y, w, h, color) {
      for (var i = 0; i < w; i++)
        for (var j = 0; j < h; j++)
          px(x + i, y + j, color);
    }

    // seeded random for consistent garden layout
    var _seed = 42;
    function srand(s) { _seed = s; }
    function rand() { _seed = (_seed * 16807 + 0) % 2147483647; return (_seed & 0x7fffffff) / 0x7fffffff; }
    function randInt(min, max) { return Math.floor(rand() * (max - min + 1)) + min; }
    function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

    // ground
    function drawGround() {
      var groundY = 58;
      var W = Math.floor(canvas.width / PX);
      for (var x = 0; x < W; x++) {
        // grass layer
        px(x, groundY, pick([COLORS.green, COLORS.greenLight, COLORS.green]));
        px(x, groundY + 1, pick([COLORS.green, COLORS.greenDark]));
        // soil
        for (var y = groundY + 2; y < groundY + 6; y++) {
          px(x, y, pick([COLORS.soil, COLORS.soilDark, COLORS.brownLight]));
        }
      }
      // grass tufts
      for (var i = 0; i < 30; i++) {
        var gx = randInt(0, W - 1);
        px(gx, groundY - 1, pick([COLORS.green, COLORS.greenLight]));
      }
    }

    // tiny flower (3-5px tall)
    function drawFlower(bx, groundY) {
      var stemH = randInt(3, 6);
      var stemColor = pick([COLORS.green, COLORS.greenDark]);
      for (var i = 0; i < stemH; i++) px(bx, groundY - 1 - i, stemColor);
      // bloom
      var petalColor = pick([COLORS.purple, COLORS.pink, COLORS.pinkLight, COLORS.purpleLight, COLORS.yellow]);
      var top = groundY - 1 - stemH;
      px(bx, top, petalColor);
      px(bx - 1, top, petalColor);
      px(bx + 1, top, petalColor);
      px(bx, top - 1, petalColor);
      // center
      px(bx, top, COLORS.yellow);
    }

    // small bush
    function drawBush(bx, groundY) {
      var c1 = pick([COLORS.green, COLORS.greenLight]);
      var c2 = pick([COLORS.greenDark, COLORS.green]);
      var w = randInt(3, 5);
      var h = randInt(2, 4);
      for (var y = 0; y < h; y++)
        for (var x = -w; x <= w; x++) {
          if (Math.abs(x) <= w - y)
            px(bx + x, groundY - 1 - y, pick([c1, c2]));
        }
      // berries
      if (rand() > 0.4) {
        px(bx - 1, groundY - 2, COLORS.purple);
        px(bx + 1, groundY - 3, COLORS.pink);
      }
    }

    // tree
    function drawTree(bx, groundY) {
      // trunk
      var trunkH = randInt(8, 14);
      for (var y = 0; y < trunkH; y++) {
        px(bx, groundY - 1 - y, COLORS.brown);
        px(bx + 1, groundY - 1 - y, COLORS.brownLight);
      }
      // canopy
      var topY = groundY - 1 - trunkH;
      var canopyR = randInt(4, 7);
      var leafColors = [COLORS.green, COLORS.greenLight, COLORS.greenDark, COLORS.purple];
      for (var cy = -canopyR; cy <= 1; cy++) {
        var rowW = canopyR - Math.abs(cy);
        for (var cx = -rowW; cx <= rowW; cx++) {
          if (rand() > 0.15) {
            px(bx + cx, topY + cy, pick(leafColors));
          }
        }
      }
      // purple blossoms scattered
      for (var i = 0; i < 4; i++) {
        var fx = bx + randInt(-canopyR + 1, canopyR - 1);
        var fy = topY + randInt(-canopyR + 1, 0);
        px(fx, fy, pick([COLORS.purple, COLORS.purpleLight, COLORS.pink]));
      }
    }

    // mushroom
    function drawMushroom(bx, groundY) {
      px(bx, groundY - 1, COLORS.brownLight);
      px(bx, groundY - 2, COLORS.brownLight);
      var capColor = pick([COLORS.purple, COLORS.pink, COLORS.purpleLight]);
      px(bx - 1, groundY - 3, capColor);
      px(bx, groundY - 3, capColor);
      px(bx + 1, groundY - 3, capColor);
      px(bx, groundY - 4, capColor);
      // dot
      px(bx, groundY - 3, COLORS.white);
    }

    // sprout (tiny)
    function drawSprout(bx, groundY) {
      px(bx, groundY - 1, COLORS.green);
      px(bx, groundY - 2, COLORS.green);
      px(bx - 1, groundY - 3, COLORS.greenLight);
      px(bx + 1, groundY - 3, COLORS.greenLight);
    }

    // seed in soil
    function drawSeed(bx, groundY) {
      px(bx, groundY + 1, COLORS.brownLight);
      // tiny mound
      px(bx - 1, groundY, pick([COLORS.soil, COLORS.soilDark]));
      px(bx, groundY, pick([COLORS.soil, COLORS.soilDark]));
      px(bx + 1, groundY, pick([COLORS.soil, COLORS.soilDark]));
    }

    // butterfly (decoration)
    function drawButterfly(bx, by) {
      var c = pick([COLORS.purple, COLORS.pink, COLORS.purpleLight]);
      px(bx - 1, by - 1, c);
      px(bx + 1, by - 1, c);
      px(bx - 1, by, c);
      px(bx + 1, by, c);
      px(bx, by, COLORS.dark);
    }

    function renderGarden(count) {
      // clear
      ctx.fillStyle = COLORS.sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      var groundY = 58;
      srand(777); // consistent layout

      drawGround();

      // decide what to place based on entry count
      var elements = [];
      var W = Math.floor(canvas.width / PX);

      // always some base elements
      if (count >= 1) elements.push({ type: 'sprout', x: randInt(10, 20) });
      if (count >= 2) elements.push({ type: 'flower', x: randInt(25, 40) });
      if (count >= 3) elements.push({ type: 'flower', x: randInt(55, 70) });
      if (count >= 4) elements.push({ type: 'mushroom', x: randInt(75, 90) });
      if (count >= 5) elements.push({ type: 'bush', x: randInt(100, 115) });
      if (count >= 6) elements.push({ type: 'flower', x: randInt(118, 130) });
      if (count >= 7) elements.push({ type: 'sprout', x: randInt(42, 52) });
      if (count >= 8) elements.push({ type: 'tree', x: randInt(135, 148) });
      if (count >= 10) elements.push({ type: 'flower', x: randInt(8, 15) });
      if (count >= 10) elements.push({ type: 'bush', x: randInt(45, 55) });
      if (count >= 12) elements.push({ type: 'tree', x: randInt(22, 35) });
      if (count >= 14) elements.push({ type: 'flower', x: randInt(60, 68) });
      if (count >= 14) elements.push({ type: 'mushroom', x: randInt(95, 105) });
      if (count >= 16) elements.push({ type: 'tree', x: randInt(70, 85) });
      if (count >= 18) elements.push({ type: 'bush', x: randInt(148, 158) });
      if (count >= 20) elements.push({ type: 'flower', x: randInt(155, 165) });
      if (count >= 22) elements.push({ type: 'tree', x: randInt(110, 125) });
      if (count >= 25) {
        elements.push({ type: 'flower', x: randInt(3, 8) });
        elements.push({ type: 'flower', x: randInt(160, 168) });
        elements.push({ type: 'mushroom', x: randInt(50, 58) });
      }

      // if zero entries, show empty soil with a single seed
      if (count === 0) {
        drawSeed(Math.floor(W / 2), groundY);
      }

      // draw all elements
      elements.forEach(function(el) {
        switch (el.type) {
          case 'sprout': drawSprout(el.x, groundY); break;
          case 'flower': drawFlower(el.x, groundY); break;
          case 'bush': drawBush(el.x, groundY); break;
          case 'tree': drawTree(el.x, groundY); break;
          case 'mushroom': drawMushroom(el.x, groundY); break;
          case 'seed': drawSeed(el.x, groundY); break;
        }
      });

      // butterflies if enough entries
      if (count >= 6) drawButterfly(randInt(20, 50), randInt(15, 35));
      if (count >= 12) drawButterfly(randInt(80, 130), randInt(10, 30));
      if (count >= 20) drawButterfly(randInt(140, 160), randInt(20, 40));
    }

    // icons for entries
    var ENTRY_ICONS = ['&#9752;', '&#10047;', '&#9672;', '&#10036;', '&#9670;'];

    function renderEntries() {
      var list = document.getElementById('entries-list');
      var html = '';
      entries.forEach(function(e, i) {
        var icon = ENTRY_ICONS[i % ENTRY_ICONS.length];
        html += '<div class="entry">';
        html += '<span class="entry-icon" style="color:var(--purple)">' + icon + '</span>';
        html += '<span class="entry-text">' + e.text + '</span>';
        html += '<span class="entry-date"> — ' + e.date + '</span>';
        html += '</div>';
      });
      list.innerHTML = html;
    }

    function updateStats() {
      var el = document.getElementById('garden-stats');
      var n = entries.length;
      var word = n === 1 ? 'thought' : 'thoughts';
      var stage = '';
      if (n === 0) stage = '[ empty soil — plant your first seed ]';
      else if (n <= 2) stage = '[ seedling stage ]';
      else if (n <= 5) stage = '[ sprouting ]';
      else if (n <= 10) stage = '[ growing nicely ]';
      else if (n <= 20) stage = '[ flourishing ]';
      else stage = '[ in full bloom ]';
      el.textContent = n + ' ' + word + ' planted  ' + stage;
    }

    // go
    renderGarden(entries.length);
    renderEntries();
    updateStats();
  </script>
</body>
</html>
