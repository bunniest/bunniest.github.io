<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>films – bunny garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f1f6f8;
      --dark:     #21273d;
      --slate:    #6a759b;
      --blue:     #b9d4f1;
      --blue-dim: rgba(185,212,241,0.15);
      --purple:   #8c7dc0;
      --muted:    #7a87a8;
      --border:   #c4d6e8;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--dark);
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.8;
    }
    .page { max-width: 640px; margin: 0 auto; padding: 0 1.5rem; }
    a { color: var(--slate); text-underline-offset: 2px; }
    a:hover { color: var(--dark); }
    header { padding: 2.75rem 0 1.375rem; }
    .site-title { font-family: 'VT323', monospace; font-size: 2.625rem; color: var(--dark); letter-spacing: 0.04em; line-height: 1; }
    .site-title a { text-decoration: none; color: inherit; }
    .dot { color: var(--purple); }
    nav { margin-top: 0.625rem; display: flex; flex-wrap: wrap; column-gap: 1.25rem; }
    nav a { font-size: 0.875rem; color: var(--muted); text-decoration: none; }
    nav a:hover { color: var(--dark); text-decoration: underline; }
    nav a.active { color: var(--slate); text-decoration: underline; }
    .rule { border: none; border-top: 1px dashed var(--border); margin: 0; }
    .section { padding: 1.75rem 0; }
    .section-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; }
    .section-label { font-family: 'VT323', monospace; font-size: 1.375rem; color: var(--slate); letter-spacing: 0.04em; }
    .section-label::before { content: '> '; color: var(--purple); }
    .section-more { font-size: 0.8125rem; color: var(--muted); text-decoration: none; }
    .section-more:hover { color: var(--slate); }
    footer { padding: 1.75rem 0 3.5rem; font-size: 0.8125rem; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .footer-links { display: flex; gap: 1rem; }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--dark); }

    /* diary */
    .film-entry { display: flex; gap: 0.875rem; padding: 0.875rem 0; border-bottom: 1px dotted var(--border); }
    .film-entry:last-child { border-bottom: none; }
    .film-poster { flex-shrink: 0; width: 46px; }
    .film-poster img { width: 46px; display: block; border: 1px solid var(--border); }
    .film-poster-empty { width: 46px; height: 68px; background: var(--blue-dim); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--muted); text-align: center; }
    .film-info { flex: 1; min-width: 0; }
    .film-title { color: var(--dark); font-weight: 700; text-decoration: none; }
    .film-title:hover { color: var(--slate); text-decoration: underline; }
    .film-year { color: var(--muted); font-size: 0.875rem; }
    .film-rating { color: var(--purple); font-size: 1rem; margin-top: 0.1rem; }
    .film-date { font-size: 0.8125rem; color: var(--muted); }
    .film-review { font-size: 0.875rem; font-style: italic; margin-top: 0.2rem; }

    #diary-status { font-size: 0.9rem; color: var(--muted); padding: 0.25rem 0 0.75rem; }
    #btn-more { margin-top: 1rem; font-family: 'Courier Prime', monospace; font-size: 0.875rem; color: var(--slate); background: transparent; border: 1px solid var(--border); padding: 0.25rem 0.875rem; cursor: pointer; display: none; }
    #btn-more:hover { background: var(--blue-dim); color: var(--dark); }

    @media (max-width: 480px) { .site-title { font-size: 2rem; } }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="site-title"><a href="index.html">bunny garden<span class="dot">.</span></a></div>
      <nav>
        <a href="about.html">about</a>
        <a href="now.html">now</a>
        <a href="films.html" class="active">films</a>
        <a href="garden.html">garden</a>
        <a href="guestbook.html">guestbook</a>
        <a href="archive.html">all posts</a>
        <a href="feed.xml">rss</a>
      </nav>
    </header>

    <hr class="rule">

    <div class="section">
      <div class="section-head">
        <span class="section-label">diary</span>
        <a class="section-more" href="https://letterboxd.com/manipulative/films/diary/" target="_blank" rel="noopener">letterboxd &rarr;</a>
      </div>
      <div id="diary-status">loading...</div>
      <div id="diary-list"></div>
      <button id="btn-more">+ show more</button>
    </div>

    <hr class="rule">

    <footer>
      <div class="footer-links">
        <a href="mailto:you@email.com">contact</a>
        <a href="guestbook.html">guestbook</a>
        <a href="feed.xml">rss</a>
      </div>
      <span>made with &#9825;</span>
    </footer>

  </div>
  <script>
    var LB_USER   = 'manipulative';
    var BATCH     = 10;
    var FEED      = 'https://letterboxd.com/' + LB_USER + '/rss/';
    var PROXY     = 'https://api.allorigins.win/get?url=' + encodeURIComponent(FEED);

    var allEntries = [];
    var shown = 0;

    // safely get text from a tag, trying multiple approaches
    function getText(parent, tagName) {
      // try with letterboxd namespace
      var ns = parent.getElementsByTagNameNS('https://letterboxd.com', tagName);
      if (ns.length) return ns[0].textContent.trim();
      // try prefixed
      var pre = parent.getElementsByTagName('letterboxd:' + tagName);
      if (pre.length) return pre[0].textContent.trim();
      // try plain
      var plain = parent.getElementsByTagName(tagName);
      if (plain.length) return plain[0].textContent.trim();
      return '';
    }

    function toStars(r) {
      var n = parseFloat(r);
      if (!r || isNaN(n) || n <= 0) return '';
      var s = '';
      for (var i = 0; i < Math.floor(n); i++) s += '\u2605';
      if (n % 1 >= 0.5) s += '\u00BD';
      return s;
    }

    function fmtDate(s) {
      if (!s) return '';
      var parts = s.split('-');
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return parseInt(parts[2], 10) + ' ' + months[parseInt(parts[1], 10) - 1] + ' ' + parts[0];
    }

    function getPoster(html) {
      var m = html.match(/src="([^"]+)"/);
      return m ? m[1] : null;
    }

    function getReview(html) {
      var t = html
        .replace(/<img[^>]*>/gi, '')
        .replace(/<p>\s*Watched[^<]*<\/p>/gi, '')
        .replace(/<[^>]+>/g, '')
        .trim();
      if (t.length > 200) t = t.slice(0, 200).trimRight() + '\u2026';
      return t;
    }

    function makeCard(e) {
      var div = document.createElement('div');
      div.className = 'film-entry';

      var poster = e.poster
        ? '<img src="' + e.poster + '" alt="" loading="lazy">'
        : '<div class="film-poster-empty">no<br>img</div>';

      div.innerHTML =
        '<div class="film-poster"><a href="' + e.link + '" target="_blank" rel="noopener">' + poster + '</a></div>' +
        '<div class="film-info">' +
          '<div>' +
            '<a class="film-title" href="' + e.link + '" target="_blank" rel="noopener">' + e.title + '</a>' +
            (e.year ? ' <span class="film-year">(' + e.year + ')</span>' : '') +
          '</div>' +
          (e.stars ? '<div class="film-rating">' + e.stars + '</div>' : '') +
          (e.date  ? '<div class="film-date">watched ' + e.date + '</div>' : '') +
          (e.review ? '<div class="film-review">' + e.review + '</div>' : '') +
        '</div>';

      return div;
    }

    function showBatch() {
      var list  = document.getElementById('diary-list');
      var slice = allEntries.slice(shown, shown + BATCH);
      slice.forEach(function(e) { list.appendChild(makeCard(e)); });
      shown += slice.length;
      document.getElementById('btn-more').style.display =
        shown < allEntries.length ? 'inline-block' : 'none';
    }

    function load() {
      var statusEl = document.getElementById('diary-status');

      fetch(PROXY)
        .then(function(res) {
          if (!res.ok) throw new Error('proxy returned ' + res.status);
          return res.json();
        })
        .then(function(json) {
          if (!json || !json.contents) throw new Error('proxy returned empty contents');

          var xmlText = json.contents;
          var parser  = new DOMParser();
          var doc     = parser.parseFromString(xmlText, 'text/xml');

          // DOMParser doesn't throw — check for a parsererror element
          var errEl = doc.getElementsByTagName('parsererror');
          if (errEl.length > 0) throw new Error('XML parse error: ' + errEl[0].textContent.slice(0, 120));

          // getElementsByTagName works reliably on XML documents
          var items = doc.getElementsByTagName('item');
          if (!items.length) throw new Error('feed parsed ok but contained 0 items');

          for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var desc = getText(item, 'description');
            // <link> in RSS 2.0 is a text node; nextSibling trick avoids HTML <link> confusion
            var linkEl   = item.getElementsByTagName('link')[0];
            var linkHref = linkEl ? (linkEl.textContent || linkEl.getAttribute('href') || '#').trim() : '#';

            allEntries.push({
              title:  getText(item, 'filmTitle') || getText(item, 'title').split(',')[0],
              year:   getText(item, 'filmYear'),
              stars:  toStars(getText(item, 'memberRating')),
              date:   fmtDate(getText(item, 'watchedDate')),
              link:   linkHref,
              poster: getPoster(desc),
              review: getReview(desc),
            });
          }

          statusEl.style.display = 'none';
          showBatch();
        })
        .catch(function(err) {
          console.error('[bunny garden] letterboxd error:', err.message);
          statusEl.innerHTML =
            "couldn't load right now \u2014 " +
            "<a href='https://letterboxd.com/" + LB_USER + "/films/diary/' target='_blank' rel='noopener'>view on letterboxd &rarr;</a>";
        });
    }

    document.getElementById('btn-more').addEventListener('click', showBatch);
    load();
  </script>
</body>
</html>
